steps:
  # ── Build Docker images ──────────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-api"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api:latest"
      - "-f"
      - "docker/Dockerfile.api"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "build-ml"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:latest"
      - "-f"
      - "docker/Dockerfile.ml"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    id: "build-rag"
    args:
      - "build"
      - "--platform"
      - "linux/amd64"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag:$COMMIT_SHA"
      - "-t"
      - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag:latest"
      - "-f"
      - "docker/Dockerfile.rag"
      - "."

  # ── Push images to Artifact Registry ────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-api"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api"]
    waitFor: ["build-api"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-ml"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml"]
    waitFor: ["build-ml"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-rag"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag"]
    waitFor: ["build-rag"]

  # ── Train all ML models on Vertex AI ────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "train-models"
    waitFor: ["push-ml"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        for MODEL in tire_degradation driving_style safety_car pit_window overtake_prob race_outcome; do
          echo "Submitting: $$MODEL"
          gcloud ai custom-jobs create \
            --region=us-central1 \
            --display-name="train-$$MODEL-$SHORT_SHA" \
            --worker-pool-spec="machine-type=n1-standard-8,replica-count=1,container-image-uri=us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:$COMMIT_SHA" \
            --args="python,ml/training/train_$$MODEL.py" \
            --project=f1optimizer \
            --format="value(name)" > /workspace/job_$$MODEL.txt
        done
        for MODEL in tire_degradation driving_style safety_car pit_window overtake_prob race_outcome; do
          JOB_ID=$$(cat /workspace/job_$$MODEL.txt)
          for i in $$(seq 1 180); do
            STATE=$$(gcloud ai custom-jobs describe $$JOB_ID \
              --region=us-central1 --project=f1optimizer \
              --format="value(state)" 2>/dev/null)
            echo "  [$$i/180] $$MODEL state: $$STATE"
            if [ "$$STATE" = "JOB_STATE_SUCCEEDED" ]; then break; fi
            if [ "$$STATE" = "JOB_STATE_FAILED" ] || [ "$$STATE" = "JOB_STATE_CANCELLED" ]; then
              echo "$$MODEL training failed"
              exit 1
            fi
            sleep 60
          done
        done

  # ── Validate trained models against performance thresholds ──────────────────
  - name: "python:3.10-slim"
    id: "validate-models"
    waitFor: ["train-models"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/validate_models.py

  # ── Check bias slice disparity ───────────────────────────────────────────────
  - name: "python:3.10-slim"
    id: "check-bias"
    waitFor: ["validate-models"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/check_bias.py

  # ── RAG unit tests ────────────────────────────────────────────────────────────
  - name: 'python:3.10-slim'
    id: 'test-rag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install -r docker/requirements-rag.txt -q
        pip install pytest pytest-cov -q
        printf '[run]\nomit = rag/ingestion_job.py\n' > .coveragerc
        PYTHONPATH=. pytest tests/unit/rag/ -v \
          --cov=rag \
          --cov-report=term-missing \
          --cov-fail-under=60
    env:
      - 'PYTHONPATH=.'

  # ── Push models to Vertex AI Model Registry ──────────────────────────────────
  - name: "python:3.10-slim"
    id: "push-models-registry"
    waitFor: ["check-bias", "test-rag"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/push_registry.py

  # ── Rollback check ────────────────────────────────────────────────────────────
  - name: "python:3.10-slim"
    id: "rollback-check"
    waitFor: ["push-models-registry"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform google-cloud-storage
        python /workspace/cloudbuild/rollback.py

  # ── Prune old COMMIT_SHA images — keep latest + 4 most recent SHA tags ───────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "prune-old-images"
    waitFor: ["rollback-check"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        for IMAGE in api ml rag; do
          REPO="us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/$$IMAGE"
          DIGESTS=$$(gcloud artifacts docker images list $$REPO \
            --include-tags --sort-by="~CREATE_TIME" \
            --filter="tags!=latest" \
            --format="value(DIGEST)" \
            --project=f1optimizer 2>/dev/null | tail -n +6)
          for DIGEST in $$DIGESTS; do
            echo "Deleting $$REPO@$$DIGEST"
            gcloud artifacts docker images delete "$$REPO@$$DIGEST" \
              --quiet --project=f1optimizer --async || true
          done
        done

images:
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api:$COMMIT_SHA"
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api:latest"
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:$COMMIT_SHA"
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:latest"
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag:$COMMIT_SHA"
  - "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag:latest"

options:
  logging: LEGACY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  machineType: "E2_HIGHCPU_8"

timeout: "14400s"
