steps:
  # ── Detect all changes (single git diff, all flags) ──────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "detect-changes"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        git fetch --depth=2 origin 2>/dev/null || true
        DIFF=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
        echo "Changed files:"
        echo "$$DIFF"

        # api image: Dockerfile.api, requirements-api.txt, src/, rag/, pipeline/, ml/
        echo "$$DIFF" | grep -qE '^(docker/Dockerfile\.api|docker/requirements-api\.txt|src/|rag/|pipeline/|ml/)' \
          && touch /workspace/api_rebuild || true

        # ml image: Dockerfile.ml, requirements-ml*.txt, ml/, src/
        echo "$$DIFF" | grep -qE '^(docker/Dockerfile\.ml|docker/requirements-ml|ml/|src/)' \
          && touch /workspace/ml_rebuild || true

        # rag image: Dockerfile.rag, requirements-rag.txt, rag/, src/
        echo "$$DIFF" | grep -qE '^(docker/Dockerfile\.rag|docker/requirements-rag\.txt|rag/|src/)' \
          && touch /workspace/rag_rebuild || true

        # ml training: ml/training/, ml/features/, ml/preprocessing/
        echo "$$DIFF" | grep -qE '^ml/(training|features|preprocessing)/' \
          && touch /workspace/ml_changed || true

        # rag ingestion trigger: rag/document_fetcher.py
        echo "$$DIFF" | grep -qE '^rag/document_fetcher\.py$' \
          && touch /workspace/rag_changed || true

        echo "--- Summary ---"
        [ -f /workspace/api_rebuild ]  && echo "  api image:     REBUILD" || echo "  api image:     retag only"
        [ -f /workspace/ml_rebuild ]   && echo "  ml image:      REBUILD" || echo "  ml image:      retag only"
        [ -f /workspace/rag_rebuild ]  && echo "  rag image:     REBUILD" || echo "  rag image:     retag only"
        [ -f /workspace/ml_changed ]   && echo "  ml training:   RUN"     || echo "  ml training:   skip"
        [ -f /workspace/rag_changed ]  && echo "  rag ingestion: RUN"     || echo "  rag ingestion: skip"

  # ── Build/push API image (rebuild or retag) ──────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-push-api"
    waitFor: ["detect-changes"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        REPO="us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/api"
        if [ -f /workspace/api_rebuild ]; then
          echo "Building api image..."
          docker build --platform linux/amd64 \
            -t $$REPO:$COMMIT_SHA \
            -t $$REPO:latest \
            -f docker/Dockerfile.api .
          docker push --all-tags $$REPO
        else
          echo "No api changes — retagging latest as $COMMIT_SHA"
          docker pull $$REPO:latest
          docker tag $$REPO:latest $$REPO:$COMMIT_SHA
          docker push $$REPO:$COMMIT_SHA
        fi

  # ── Build/push ML image (rebuild or retag) ───────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-push-ml"
    waitFor: ["detect-changes"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        REPO="us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml"
        if [ -f /workspace/ml_rebuild ]; then
          echo "Building ml image..."
          docker build --platform linux/amd64 \
            -t $$REPO:$COMMIT_SHA \
            -t $$REPO:latest \
            -f docker/Dockerfile.ml .
          docker push --all-tags $$REPO
        else
          echo "No ml changes — retagging latest as $COMMIT_SHA"
          docker pull $$REPO:latest
          docker tag $$REPO:latest $$REPO:$COMMIT_SHA
          docker push $$REPO:$COMMIT_SHA
        fi

  # ── Build/push RAG image (rebuild or retag) ──────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-push-rag"
    waitFor: ["detect-changes"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        REPO="us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag"
        if [ -f /workspace/rag_rebuild ]; then
          echo "Building rag image..."
          docker build --platform linux/amd64 \
            -t $$REPO:$COMMIT_SHA \
            -t $$REPO:latest \
            -f docker/Dockerfile.rag .
          docker push --all-tags $$REPO
        else
          echo "No rag changes — retagging latest as $COMMIT_SHA"
          docker pull $$REPO:latest
          docker tag $$REPO:latest $$REPO:$COMMIT_SHA
          docker push $$REPO:$COMMIT_SHA
        fi

  # ── Train all ML models on Vertex AI (only if ml/training|features|preprocessing changed) ──
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "train-models"
    waitFor: ["build-push-ml"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ ! -f /workspace/ml_changed ]; then
          echo "Skipping model training — no ML training file changes detected"
          exit 0
        fi
        for MODEL in tire_degradation driving_style safety_car pit_window overtake_prob race_outcome; do
          echo "Submitting: $$MODEL"
          gcloud ai custom-jobs create \
            --region=us-central1 \
            --display-name="train-$$MODEL-$SHORT_SHA" \
            --worker-pool-spec="machine-type=n1-standard-8,replica-count=1,container-image-uri=us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/ml:$COMMIT_SHA" \
            --args="python,ml/training/train_$$MODEL.py" \
            --project=f1optimizer \
            --format="value(name)" > /workspace/job_$$MODEL.txt
        done
        for MODEL in tire_degradation driving_style safety_car pit_window overtake_prob race_outcome; do
          JOB_ID=$$(cat /workspace/job_$$MODEL.txt)
          for i in $$(seq 1 180); do
            STATE=$$(gcloud ai custom-jobs describe $$JOB_ID \
              --region=us-central1 --project=f1optimizer \
              --format="value(state)" 2>/dev/null)
            echo "  [$$i/180] $$MODEL state: $$STATE"
            if [ "$$STATE" = "JOB_STATE_SUCCEEDED" ]; then break; fi
            if [ "$$STATE" = "JOB_STATE_FAILED" ] || [ "$$STATE" = "JOB_STATE_CANCELLED" ]; then
              echo "$$MODEL training failed"
              exit 1
            fi
            sleep 60
          done
        done

  # ── Validate trained models against performance thresholds ──────────────────
  - name: "python:3.10-slim"
    id: "validate-models"
    waitFor: ["train-models"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ ! -f /workspace/ml_changed ]; then
          echo "Skipping — training was skipped"
          exit 0
        fi
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/validate_models.py

  # ── Check bias slice disparity ───────────────────────────────────────────────
  - name: "python:3.10-slim"
    id: "check-bias"
    waitFor: ["validate-models"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ ! -f /workspace/ml_changed ]; then
          echo "Skipping — training was skipped"
          exit 0
        fi
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/check_bias.py

  # ── Run RAG ingestion job on GCP (only if rag/document_fetcher.py changed) ───
  - name: "us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/rag:$COMMIT_SHA"
    id: "run-rag-ingestion"
    waitFor: ["build-push-rag"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        if [ ! -f /workspace/rag_changed ]; then
          echo "Skipping RAG ingestion — no document_fetcher.py changes detected"
          exit 0
        fi
        python -m rag.ingestion_job
    env:
      - "GOOGLE_CLOUD_PROJECT=f1optimizer"
      - "VECTOR_SEARCH_INDEX_ID=$_VECTOR_SEARCH_INDEX_ID"
      - "VECTOR_SEARCH_ENDPOINT_ID=$_VECTOR_SEARCH_ENDPOINT_ID"
      - "VECTOR_SEARCH_DEPLOYED_INDEX_ID=$_VECTOR_SEARCH_DEPLOYED_INDEX_ID"

  # ── RAG unit tests (always run — fast, no image dependency) ─────────────────
  - name: 'python:3.10-slim'
    id: 'test-rag'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        pip install --quiet \
          pydantic==2.5.3 pydantic-settings==2.1.0 \
          pandas==2.2.2 pyarrow==15.0.2 \
          langchain-core==0.2.40 \
          google-cloud-storage==2.16.0 \
          google-cloud-aiplatform==1.71.1 \
          vertexai==1.71.1 \
          requests==2.31.0 "beautifulsoup4>=4.12.0" "lxml>=4.9.0" "pypdf>=3.0.0" \
          pytest pytest-cov
        printf '[run]\nomit = rag/ingestion_job.py\n' > .coveragerc
        PYTHONPATH=. pytest tests/unit/rag/ -v \
          --cov=rag \
          --cov-report=term-missing \
          --cov-fail-under=60
    env:
      - 'PYTHONPATH=.'

  # ── Push models to Vertex AI Model Registry ──────────────────────────────────
  - name: "python:3.10-slim"
    id: "push-models-registry"
    waitFor: ["check-bias", "test-rag"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform
        python /workspace/cloudbuild/push_registry.py

  # ── Rollback check ────────────────────────────────────────────────────────────
  - name: "python:3.10-slim"
    id: "rollback-check"
    waitFor: ["push-models-registry", "run-rag-ingestion"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        pip install --quiet google-cloud-aiplatform google-cloud-storage
        python /workspace/cloudbuild/rollback.py

  # ── Prune old COMMIT_SHA images — keep latest + 4 most recent SHA tags ───────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    id: "prune-old-images"
    waitFor: ["rollback-check"]
    entrypoint: "bash"
    args:
      - "-c"
      - |
        for IMAGE in api ml rag; do
          REPO="us-central1-docker.pkg.dev/f1optimizer/f1-optimizer/$$IMAGE"
          DIGESTS=$$(gcloud artifacts docker images list $$REPO \
            --include-tags --sort-by="~CREATE_TIME" \
            --filter="tags!=latest" \
            --format="value(DIGEST)" \
            --project=f1optimizer 2>/dev/null | tail -n +6)
          for DIGEST in $$DIGESTS; do
            echo "Deleting $$REPO@$$DIGEST"
            gcloud artifacts docker images delete "$$REPO@$$DIGEST" \
              --quiet --project=f1optimizer --async || true
          done
        done

options:
  logging: LEGACY
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
  machineType: "E2_HIGHCPU_8"

timeout: "14400s"
