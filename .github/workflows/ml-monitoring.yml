name: ML Monitoring (Drift & Accuracy)

on:
  schedule:
    # Run daily at 3:00 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Manual trigger
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    name: Run ML Monitoring Job
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          # Use the generic requirements-test.txt for caching or a specific one
          cache-dependency-path: docker/requirements-ml.txt

      - name: Authenticate to GCP
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements-ml.txt
          # The monitoring script requires access to local modules
          pip install -e . || echo "Editable install failed, continuing with PYTHONPATH"

      - name: Run Monitoring Job
        env:
          PROJECT_ID: 'f1optimizer'
          MODELS_BUCKET: 'f1optimizer-models'
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Use --log-to-cloud to ensure results hit GCS/Cloud Logging
          # Use --days 1 to monitor the previous day's telemetry
          python ml/monitoring/run_monitoring.py --log-to-cloud --days 1
