name: ML CI Gate

on:
  pull_request:
    branches: [ main, develop, pipeline ]
    paths:
      - 'ml/**'
      - 'src/llm/model_bridge.py'
      - 'docker/requirements-ml.txt'
      - '.github/workflows/ml-ci.yml'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ml-tests:
    name: ML Validation & Smoke Tests
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: docker/requirements-ml.txt

      - name: Authenticate to GCP
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r docker/requirements-ml.txt
          # For testing, we also need pytest and related tools if not in requirements-ml.txt
          pip install pytest pytest-cov mock
          pip install -e . || echo "Editable install failed, continuing with PYTHONPATH"

      - name: Run ML Unit Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Run feature engineering and preprocessing tests
          pytest ml/tests/test_features.py ml/tests/test_preprocessing.py -v

      - name: Run Model Smoke Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Verify that existing models in GCS can still be loaded and predict correctly
          pytest ml/tests/test_models.py -v
