name: CI Pipeline

on:
  push:
    branches: [ main, develop, pipeline, 'claude/**' ]
  pull_request:
    branches: [ main, develop, pipeline ]

jobs:
  # ── Path detection ────────────────────────────────────────────────────────
  # Every downstream job gates on one or more of these outputs.
  # Jobs whose paths didn't change are skipped; all-checks-passed treats
  # skipped as success so the gate never blocks unrelated changes.
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend:   ${{ steps.filter.outputs.backend }}
      ml:        ${{ steps.filter.outputs.ml }}
      rl:        ${{ steps.filter.outputs.rl }}
      terraform: ${{ steps.filter.outputs.terraform }}
      frontend:  ${{ steps.filter.outputs.frontend }}
      docker:    ${{ steps.filter.outputs.docker }}
      docs:      ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'src/**'
              - 'rag/**'
              - 'tests/**'
              - 'requirements*.txt'
            ml:
              - 'ml/**'
              - '!ml/rl/**'
              - '!ml/training/train_rl.py'
            rl:
              - 'ml/rl/**'
              - 'ml/training/train_rl.py'
              - 'docker/Dockerfile.ml'
            terraform:
              - 'infra/terraform/**'
            frontend:
              - 'frontend/**'
            docker:
              - 'docker/**'
              - 'cloudbuild.yaml'
              - 'cloudbuild/**'
              - 'requirements*.txt'
            docs:
              - 'docs/**'
              - '**/*.md'
              - 'mkdocs.yml'

  # ── Lint ─────────────────────────────────────────────────────────────────
  # Runs when any Python source changes (backend, ML, or RL).
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.rl == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Black
        run: black --check src/ ml/ rag/

      - name: MyPy
        run: mypy src/ --ignore-missing-imports --follow-imports=skip

  # ── Security ──────────────────────────────────────────────────────────────
  # Runs when Python source or Docker files change.
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ml == 'true' ||
      needs.changes.outputs.docker == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install security tools
        run: pip install bandit safety

      - name: Bandit (report all findings)
        run: bandit -r src/ -f json -o bandit-report.json --exit-zero

      - name: Bandit (fail on HIGH severity)
        run: bandit -r src/ -lll -f text

      - name: Safety (check for vulnerabilities)
        run: |
          safety check --json > safety-report.json || true
          safety check

      - uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ── Unit + Coverage ───────────────────────────────────────────────────────
  # Runs when backend or ML source changes.
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ml == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run unit tests
        run: |
          pytest tests/unit/ ml/tests/test_dag.py ml/tests/test_distributed.py \
            --ignore=tests/unit/test_ml_models.py \
            -v --cov=src --cov-report=xml --cov-report=html

      - uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  # ── Integration Tests ─────────────────────────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.ml == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Run integration tests
        run: pytest tests/integration/ -v -p no:warnings || exit 0

  # ── Docker Build ──────────────────────────────────────────────────────────
  # Runs when Dockerfiles, build config, or source code changes.
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.docker == 'true' ||
      needs.changes.outputs.backend == 'true'

    strategy:
      fail-fast: false
      matrix:
        service: [api, ml, ingest]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.${{ matrix.service }}
          push: false
          platforms: linux/amd64
          tags: f1-optimizer-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Terraform ─────────────────────────────────────────────────────────────
  # Runs only when infra/terraform/** changes.
  terraform-validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.terraform == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: |
          cd infra/terraform
          terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          cd infra/terraform
          terraform init -backend=false

      - name: Terraform Validate
        run: |
          cd infra/terraform
          terraform validate

  # ── Docs ──────────────────────────────────────────────────────────────────
  # Runs only when docs/** or *.md files change.
  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.docs == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install mkdocs mkdocs-material

      - name: Build documentation
        run: mkdocs build

  # ── RL Smoke Test (path-filtered) ─────────────────────────────────────────
  rl-smoke-test:
    name: RL Smoke Test (physics fallback)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.rl == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install stable-baselines3==2.7.1 gymnasium==1.2.3 \
                      numpy pandas scikit-learn matplotlib

      - name: Smoke test — physics fallback (no GCS, no models)
        run: |
          python ml/training/train_rl.py \
            --smoke-test \
            --no-models \
            --n-envs 1 \
            --timesteps 2000 \
            --save-dir /tmp/rl_ci_checkpoints
        timeout-minutes: 10

      - name: Verify output files exist
        run: |
          ls /tmp/rl_ci_checkpoints/final_policy.zip
          ls /tmp/rl_ci_checkpoints/final_vec_normalize.pkl

      - uses: actions/upload-artifact@v4
        with:
          name: rl-smoke-checkpoint-${{ github.sha }}
          path: /tmp/rl_ci_checkpoints/
          retention-days: 7

  rl-env-validation:
    name: RL Environment Validation
    runs-on: ubuntu-latest
    needs: rl-smoke-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install stable-baselines3==2.7.1 gymnasium==1.2.3 \
                      numpy pandas scikit-learn matplotlib

      - name: Validate Gymnasium environment API compliance
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          from gymnasium.utils.env_checker import check_env
          from ml.rl.environment import F1RaceEnv

          env = F1RaceEnv(
              race_ids  = ["2024_4"],
              driver_id = "lando_norris",
              adapters  = {},
          )
          check_env(env, warn=True, skip_render_check=True)
          print("Gymnasium env check passed")
          env.close()
          EOF

      - name: Validate observation space dimensions
        run: |
          python - <<'EOF'
          import sys
          sys.path.insert(0, '.')
          import numpy as np
          from ml.rl.environment import F1RaceEnv
          from ml.rl.state import STATE_DIM

          env = F1RaceEnv(race_ids=["2024_16"], driver_id="lando_norris", adapters={})
          obs, info = env.reset()
          assert obs.shape == (STATE_DIM,), f"Expected ({STATE_DIM},), got {obs.shape}"
          assert obs.dtype == np.float32, f"Expected float32, got {obs.dtype}"

          action = env.action_space.sample()
          obs2, reward, terminated, truncated, info2 = env.step(int(action))
          assert obs2.shape == (STATE_DIM,)
          assert isinstance(reward, float), f"Reward must be float, got {type(reward)}"
          print(f"Obs shape: {obs.shape}, reward: {reward:.3f}, info keys: {list(info2.keys())}")
          env.close()
          EOF

  # ── Frontend Deploy (Firebase Hosting) ───────────────────────────────────
  # Runs only on push when frontend/** changes.
  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name == 'push' &&
      needs.changes.outputs.frontend == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install data pipeline dependencies
        run: pip install pandas pyarrow google-cloud-storage

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Generate static data from GCS
        run: python pipeline/scripts/generate_static_json.py --bucket f1optimizer-data-lake --out frontend/public/data

      - name: Build
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CLOUD_RUN_URL: ${{ secrets.VITE_CLOUD_RUN_URL }}
          VITE_API_USER: ${{ secrets.VITE_API_USER }}
          VITE_API_PASS: ${{ secrets.VITE_API_PASS }}

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: f1optimizer
          channelId: live
          entryPoint: frontend

  # ── Gate ──────────────────────────────────────────────────────────────────
  # All path-filtered jobs treat "skipped" as success so this gate never
  # blocks a push that only touched unrelated files.
  all-checks-passed:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs:
      - changes
      - lint
      - security
      - test
      - integration-test
      - docker-build
      - terraform-validate
      - docs
      - rl-smoke-test
      - rl-env-validation
      - deploy-frontend
    if: always()

    steps:
      - name: Check all jobs
        run: |
          fail=false
          check() {
            local name=$1 result=$2
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "FAIL: $name => $result"
              fail=true
            else
              echo "OK:   $name => $result"
            fi
          }

          check lint               "${{ needs.lint.result }}"
          check security           "${{ needs.security.result }}"
          check test               "${{ needs.test.result }}"
          check integration-test   "${{ needs.integration-test.result }}"
          check docker-build       "${{ needs.docker-build.result }}"
          check terraform-validate "${{ needs.terraform-validate.result }}"
          check docs               "${{ needs.docs.result }}"
          check rl-smoke-test      "${{ needs.rl-smoke-test.result }}"
          check rl-env-validation  "${{ needs.rl-env-validation.result }}"
          check deploy-frontend    "${{ needs.deploy-frontend.result }}"

          $fail && exit 1 || echo "All checks passed."
